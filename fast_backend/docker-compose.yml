version: '3.8'

services:
  api:
    build: .
    image: water-tariff-api
    container_name: water-tariff-api
    volumes:
      - ./:/app
      - db-data:/app/db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/water_tariff.db
      - PORT=8000
    restart: unless-stopped
    networks:
      - water-tariff-network

volumes:
  db-data:
    name: water-tariff-db-data

networks:
  water-tariff-network:
    name: water-tariff-network
    driver: bridge