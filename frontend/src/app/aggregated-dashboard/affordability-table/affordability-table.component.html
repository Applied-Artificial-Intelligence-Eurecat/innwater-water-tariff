<mat-card class="table-card">
  <mat-card-header>
    <mat-card-title>Affordability (PAR H)</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
      <!-- Metric Column -->
      <ng-container matColumnDef="metric">
        <th mat-header-cell *matHeaderCellDef> Metric </th>
        <td mat-cell *matCellDef="let element"> {{element.metric}} </td>
      </ng-container>

      <!-- IBT Column -->
      <ng-container matColumnDef="ibt">
        <th mat-header-cell *matHeaderCellDef> IBT </th>
        <td mat-cell *matCellDef="let element"> {{element.ibt}} </td>
      </ng-container>

      <!-- TBSE Column -->
      <ng-container matColumnDef="tbse">
        <th mat-header-cell *matHeaderCellDef> TBSE </th>
        <td mat-cell *matCellDef="let element"> {{element.tbse}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
