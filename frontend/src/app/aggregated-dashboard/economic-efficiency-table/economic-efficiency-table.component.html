<mat-card class="table-card">
  <mat-card-header>
    <mat-card-title>Economic Efficiency</mat-card-title>
    <button mat-raised-button color="primary" [routerLink]="['/economic-efficiency-details', simulationId]" class="button-right">
      Details
    </button>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
      <!-- Category Column -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef> Category </th>
        <td mat-cell *matCellDef="let element"> {{element.category}} </td>
      </ng-container>

      <!-- Consumption Column -->
      <ng-container matColumnDef="consumption">
        <th mat-header-cell *matHeaderCellDef> Conso (m³/trim) </th>
        <td mat-cell *matCellDef="let element"> {{element.consumption}} </td>
      </ng-container>

      <!-- Delta W Column -->
      <ng-container matColumnDef="deltaW">
        <th mat-header-cell *matHeaderCellDef> Delta W (€/trim) </th>
        <td mat-cell *matCellDef="let element"> {{element.deltaW}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
