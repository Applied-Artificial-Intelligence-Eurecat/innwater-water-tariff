<mat-card class="table-card">
  <mat-card-header>
    <mat-card-title>Equity</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
      <!-- Metric Column -->
      <ng-container matColumnDef="metric">
        <th mat-header-cell *matHeaderCellDef> Metric </th>
        <td mat-cell *matCellDef="let element"> {{element.metric}} </td>
      </ng-container>

      <!-- Value1 Column -->
      <ng-container matColumnDef="value1">
        <th mat-header-cell *matHeaderCellDef> Net Income Gini Index </th>
        <td mat-cell *matCellDef="let element"> {{element.value1}} </td>
      </ng-container>

      <!-- Value2 Column -->
      <ng-container matColumnDef="value2">
        <th mat-header-cell *matHeaderCellDef> DAE / AFE </th>
        <td mat-cell *matCellDef="let element"> {{element.value2}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
