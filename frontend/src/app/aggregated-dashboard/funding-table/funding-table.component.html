<mat-card class="table-card">
  <mat-card-header>
    <mat-card-title>Funding</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
      <!-- Metric Column -->
      <ng-container matColumnDef="metric">
        <th mat-header-cell *matHeaderCellDef> Metric </th>
        <td mat-cell *matCellDef="let element"> {{element.metric}} </td>
      </ng-container>

      <!-- General Column -->
      <ng-container matColumnDef="general">
        <th mat-header-cell *matHeaderCellDef> Général </th>
        <td mat-cell *matCellDef="let element" [class.font-bold]="element.isSubHeader"> 
          <ng-container *ngIf="!element.dae; else daeTemplate">{{element.general}}</ng-container>
          <ng-template #daeTemplate>{{element.dae}}</ng-template>
        </td>
      </ng-container>

      <!-- Percent Total Cost Column -->
      <ng-container matColumnDef="percentTotalCost">
        <th mat-header-cell *matHeaderCellDef> % Total Cost </th>
        <td mat-cell *matCellDef="let element" [class.font-bold]="element.isSubHeader"> 
          <ng-container *ngIf="!element.dai; else daiTemplate">{{element.percentTotalCost}}</ng-container>
          <ng-template #daiTemplate>{{element.dai}}</ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.sub-header-row]="row.isSubHeader"></tr>
    </table>
  </mat-card-content>
</mat-card>
