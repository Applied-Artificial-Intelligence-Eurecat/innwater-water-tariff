<mat-toolbar class="mat-elevation-z8">
  <button
    mat-icon-button
    *ngIf="sidenav.mode === 'over'"
    (click)="sidenav.toggle()"
  >
    <mat-icon *ngIf="!sidenav.opened"> menu </mat-icon>
    <mat-icon *ngIf="sidenav.opened"> close </mat-icon>
  </button>
  NEWTS
</mat-toolbar>

<mat-sidenav-container>
  
  <mat-sidenav #sidenav="matSidenav" class="mat-elevation-z8">
    <!--
    <img
      class="avatar mat-elevation-z8"
      src="https://source.unsplash.com/c_GmwfHBDzk/200x200"
    />

    <h4 class="name">John Smith</h4>
    <p class="designation">Software Engineer</p>

    <mat-divider></mat-divider>
-->

    <button [hidden]="!showHeader" mat-button class="menu-button" routerLink="/home">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </button>
   
    
   
    <button mat-button [hidden]="!isLoggedIn()||!showHeader" class="menu-button" routerLink="/dashboard">
      
      <span>Simulations</span>
    </button>
    <button mat-button [hidden]="isLoggedIn()" class="menu-button" routerLink="/account">
      <mat-icon>person</mat-icon>
      <span>Connect</span>
    </button>
   
    <button [hidden]="!showHeader" mat-button class="menu-button" routerLink="/about">
      <mat-icon>info</mat-icon>
      <span>About</span>
    </button>
    <div [hidden]="!isLoggedIn()" >
    <mat-divider  ></mat-divider>
      <button [hidden]="!isLoggedIn()" mat-button class="menu-button" routerLink="/last">
          
        <span>La dernière simulation</span>
      </button>
    
      <mat-divider></mat-divider>

    <button [hidden]="!isLoggedIn()" mat-button class="menu-button" routerLink="/addsimulation">
          
        <span>Ajouter une simulation</span>
      </button>
     
     
    
      <mat-divider></mat-divider>
    <button [hidden]="!isLoggedIn()" mat-button class="menu-button" routerLink="/regist">
          
      <span> Ma dernière simulation enregistrée</span>
    </button>
    
    <mat-divider></mat-divider>

    <button [hidden]="!showHeader" mat-button class="menu-button" routerLink="/help">
      <mat-icon>help</mat-icon>
      <span>Help</span>
    </button>
    <button type="submit" (click)="logout()" [hidden]="!isLoggedIn()||!showHeader" mat-raised-button color="warn">Log out</button>
  </div>
  </mat-sidenav>
  <mat-sidenav-content>
    <div class="content mat-elevation-z8">
        <app-chat-button></app-chat-button>
      <app-chat></app-chat>
      <router-outlet></router-outlet>
      
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
