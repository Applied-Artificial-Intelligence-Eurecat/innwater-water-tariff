<div class="game-detail-container">
  <h2>Game Round Participants</h2>
  
  <button mat-raised-button color="primary" (click)="goBack()" style="margin-bottom: 20px;">
    <mat-icon>arrow_back</mat-icon> Back
  </button>

  <div *ngIf="loading" class="loading-container" style="text-align: center; padding: 20px;">
    <mat-spinner diameter="40" style="margin: 0 auto;"></mat-spinner>
    <p>Loading participants...</p>
  </div>

  <div *ngIf="error" class="error-container" style="text-align: center; padding: 20px; color: red;">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="!loading && !error && participants.length === 0" style="text-align: center; padding: 20px;">
    <p>No participants found for this game round.</p>
  </div>

  <div *ngIf="!loading && !error && participants.length > 0">
    <table mat-table [dataSource]="participants" class="mat-elevation-z8" style="width: 100%;">
      <!-- Simulation Name Column -->
      <ng-container matColumnDef="simulation_name">
        <th mat-header-cell *matHeaderCellDef>Simulation Name</th>
        <td mat-cell *matCellDef="let element">{{ element.simulation_name }}</td>
      </ng-container>

      <!-- Score Column -->
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>Score</th>
        <td mat-cell *matCellDef="let element">{{ element.score }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
